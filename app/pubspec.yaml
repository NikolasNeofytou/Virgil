name: tichu_cyprus
description: A modern mobile Tichu card game & scoring companion for the Cyprus community.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Models / codegen
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Deep linking — receives virgil:// callbacks from magic-link emails
  app_links: ^6.3.0

  # Game engine (Phase B) — uncomment when needed
  # flame: ^1.18.0

  # Real-time transport (Phase B)
  # web_socket_channel: ^3.0.0

  # Notifications (Phase B)
  # firebase_core: ^3.1.0
  # firebase_messaging: ^15.0.0

  # Error tracking (A3)
  # sentry_flutter: ^8.3.0

  # Utility
  intl: ^0.20.2
  collection: ^1.18.0

  # Typography — google_fonts catalog covers Fraunces (display) and Inter (body)
  # for the Meraki rebrand, plus the legacy Virgil set (Gloock/Caveat/Kalam/
  # JetBrains Mono). Geist Mono is vendored locally — see flutter.fonts below.
  google_fonts: ^6.2.1

  # Animations (shake on error, page transitions, leaderboard fade-in stagger)
  flutter_animate: ^4.5.0

  # Confetti burst on game-over (synced with WinnerCertificate reveal)
  confetti: ^0.7.0

  # Share-sheet for the game-over summary card
  share_plus: ^10.1.4
  path_provider: ^2.1.4

  # "Save to Photos" for the game-over PNG. Add-only iOS access via
  # NSPhotoLibraryAddUsageDescription; no read permission requested.
  gal: ^2.3.0

  # Per-device "last seen" leaderboard ranks (rank-change delta chips)
  shared_preferences: ^2.3.0

  # Dynamic app icon — manual Aegean / Coral / Ochre picker on Profile.
  # iOS only; Android dynamic icons need a different mechanism and are
  # explicitly out of scope for the rebrand v2.
  flutter_dynamic_icon_plus: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

  # App icon generation — Aegean-on-Linen "V" mark, deck §04 / §04.B.
  # Run: `dart run flutter_launcher_icons` after editing assets/icon/icon.png.
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  ios: true
  android: false # mipmap PNGs are committed by hand; revisit when we stand
                 # up the Android build pipeline.
  remove_alpha_ios: true
  image_path: assets/icon/icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/cards/
    - assets/fonts/
    - assets/icon/
  fonts:
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/GeistMono-Bold.ttf
          weight: 700
